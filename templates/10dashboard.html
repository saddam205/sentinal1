<!-- templates/dashboard.html - UPDATED WITH GRAFANA INTEGRATION & MOBILE RESPONSIVENESS -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sentinel-1 | Neural Intelligence Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- D3.js for Attack Graph -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        body {
            background: #030614;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 50%, rgba(255, 0, 255, 0.05) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 10px);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        /* Mobile Optimizations */
        @media (max-width: 640px) {
            .container {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            
            .text-3xl {
                font-size: 1.5rem;
            }
            
            .cyber-card {
                padding: 1rem;
            }
            
            .stat-card {
                padding: 1rem;
            }
            
            .graph-container {
                padding: 10px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            #attackGraphSvg {
                min-width: 800px;
            }
            
            .nav-links {
                display: none;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .mobile-menu {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(10, 15, 25, 0.98);
                backdrop-filter: blur(10px);
                z-index: 1000;
                padding: 2rem;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .mobile-menu.open {
                transform: translateX(0);
            }
            
            .mobile-menu .nav-link {
                display: block;
                padding: 1rem;
                margin: 0.5rem 0;
                font-size: 1.2rem;
                text-align: center;
            }
            
            .priority-attacks-grid {
                grid-template-columns: 1fr;
            }
            
            .vuln-badge {
                font-size: 10px;
                padding: 2px 8px;
            }
            
            .grafana-frame {
                height: 300px;
            }
        }
        
        /* Tablet Optimizations */
        @media (min-width: 641px) and (max-width: 1024px) {
            .stat-card {
                padding: 1.25rem;
            }
            
            .grid {
                gap: 1rem;
            }
            
            .priority-attacks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .grafana-frame {
                height: 350px;
            }
        }
        
        /* Cyber Card */
        .cyber-card {
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cyber-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .cyber-card:hover::before {
            opacity: 0.3;
        }
        
        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00ffff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-btn:hover {
            background: rgba(0, 255, 255, 0.1);
        }
        
        /* Navigation Link */
        .nav-link {
            position: relative;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .nav-link:hover::before {
            width: 80%;
        }
        
        .nav-link.active {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        /* Pulse Animation */
        .pulse-cyan {
            animation: pulse-cyan 2s ease-in-out infinite;
        }
        
        @keyframes pulse-cyan {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }
        }
        
        /* Vulnerability Badge */
        .vuln-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        
        @media (max-width: 640px) {
            .vuln-badge {
                padding: 2px 8px;
                font-size: 10px;
            }
        }
        
        .vuln-critical { background: rgba(255, 0, 0, 0.2); color: #ff6b6b; border: 1px solid #ff0000; }
        .vuln-high { background: rgba(255, 165, 0, 0.2); color: #ffb347; border: 1px solid #ffa500; }
        .vuln-medium { background: rgba(255, 255, 0, 0.2); color: #ffff6b; border: 1px solid #ffff00; }
        .vuln-low { background: rgba(0, 255, 0, 0.2); color: #6bff6b; border: 1px solid #00ff00; }
        
        /* Stat Card */
        .stat-card {
            background: rgba(15, 20, 30, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }
        
        @media (max-width: 640px) {
            .stat-card {
                padding: 1rem;
            }
            
            .stat-card .text-2xl {
                font-size: 1.25rem;
            }
        }
        
        .stat-card:hover {
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        /* Attack Card */
        .attack-card {
            background: rgba(20, 15, 30, 0.95);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 1rem;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        @media (max-width: 640px) {
            .attack-card {
                padding: 0.75rem;
            }
        }
        
        .attack-card:hover {
            border-color: rgba(255, 0, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(255, 0, 255, 0.3);
        }
        
        /* Graph Container */
        .graph-container {
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        #attackGraphSvg {
            min-width: 1000px;
        }
        
        @media (max-width: 640px) {
            .graph-container {
                padding: 10px;
                margin: 0 -0.75rem;
                border-radius: 0;
            }
        }
        
        /* Grafana Container */
        .grafana-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 400px;
            background: #111217;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .grafana-frame {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: none;
            background: #111217;
        }
        
        .grafana-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        
        @media (max-width: 640px) {
            .grafana-container {
                min-height: 300px;
            }
            
            .grafana-frame {
                min-height: 300px;
            }
        }
        
        .node circle {
            stroke-width: 2px;
            cursor: pointer;
            transition: r 0.2s;
        }
        
        .node circle:hover {
            r: 20;
        }
        
        .node text {
            font-size: 11px;
            font-weight: 500;
            fill: #e0e0e0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        @media (max-width: 640px) {
            .node text {
                font-size: 9px;
            }
        }
        
        .link {
            stroke: #4a5568;
            stroke-width: 1.5px;
            stroke-opacity: 0.6;
            marker-end: url(#arrowhead);
        }
        
        .link.high-probability {
            stroke: #ff00ff;
            stroke-opacity: 0.8;
            stroke-width: 2.5px;
            stroke-dasharray: 5,5;
        }
        
        .link.success {
            stroke: #00ff00;
            stroke-opacity: 0.8;
            stroke-width: 2px;
        }
        
        .graph-tooltip {
