<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sentinel-1 Cybersecurity Hub</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c10 0%, #0f1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.03) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.03) 0%, transparent 50%);
            animation: rotate-reverse 25s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 2rem;
        }
        
        .login-card {
            background: rgba(15, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 2.5rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }
        
        .login-card:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-sub {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 2px;
            margin-top: 0.25rem;
        }
        
        /* Title */
        .title {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .title h2 {
            color: #e0e0e0;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .title p {
            color: #888;
            font-size: 0.85rem;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }
        
        .input-wrapper input:focus + i {
            color: #00ffff;
        }
        
        /* Error Message */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border-left: 3px solid #ff4444;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ff8888;
            font-size: 0.85rem;
        }
        
        .error-message i {
            font-size: 1rem;
        }
        
        /* Button */
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 12px;
            color: #0a0c10;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 255, 255, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        /* Links */
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        
        .links a {
            color: #888;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .links a:hover {
            color: #00ffff;
        }
        
        /* Demo Credentials */
        .demo-credentials {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .demo-credentials p {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .demo-badge {
            display: inline-flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .demo-badge span {
            background: rgba(0, 255, 255, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #00ffff;
            font-family: monospace;
        }
        
        /* Loading State */
        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-btn.loading .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #0a0c10;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            
            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            
            .logo-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-shield-haltered"></i>
                </div>
                <div class="logo-text">SENTINEL-1</div>
                <div class="logo-sub">AI INTELLIGENCE HUB</div>
            </div>
            
            <div class="title">
                <h2>Welcome Back</h2>
                <p>Sign in to access the cybersecurity platform</p>
            </div>
            
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="POST" action="/login" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>
            </form>
            
            <div class="links">
                <a href="/register">Create Account</a>
                <a href="#" onclick="return false;">Forgot Password?</a>
            </div>
            
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> Demo Credentials</p>
                <div class="demo-badge">
                    <span>admin / admin123</span>
                    <span>user / user123</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 4 + 2;
                const left = Math.random() * 100;
                const duration = Math.random() * 20 + 10;
                const delay = Math.random() * 15;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    animation-duration: ${duration}s;
                    animation-delay: -${delay}s;
                    background: rgba(0, 255, 255, ${Math.random() * 0.3 + 0.1});
                `;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Form submission handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.querySelector('span').textContent = 'Signing in...';
            btn.querySelector('i').style.display = 'none';
            
            // Add spinner
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            spinner.style.display = 'inline-block';
            btn.appendChild(spinner);
            
            // Allow form to submit normally
            setTimeout(() => {
                // The form will submit naturally - this is just visual feedback
            }, 100);
        });
        
        // Check if there's an error from server
        {% if error %}
        const errorDiv = document.querySelector('.error-message');
        if (errorDiv) {
            setTimeout(() => {
                errorDiv.style.opacity = '0';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 500);
            }, 5000);
        }
        {% endif %}
        
        // Create particles on load
        createParticles();
        
        // Add keyboard shortcut (Enter submits)
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.tagName === 'INPUT') {
                    document.getElementById('loginForm').submit();
                }
            }
        });
        
        console.log('✅ Login page loaded');
    </script>
</body>
</html>
