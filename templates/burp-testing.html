<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burp Suite Intruder - Complete Security Testing Suite</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- xterm.js for terminal -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    
    <!-- jsPDF for report generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        body {
            background: #030614;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 50%, rgba(255, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, rgba(255, 102, 0, 0.05) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 10px);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        /* Cyberpunk Card */
        .cyber-card {
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cyber-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .cyber-card:hover::before {
            opacity: 0.3;
        }
        
        /* Intruder Attack Card */
        .attack-config {
            background: rgba(20, 15, 30, 0.95);
            border: 1px solid rgba(255, 102, 0, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .attack-config:hover {
            border-color: #ff6600;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.2);
        }
        
        /* Tool Cards */
        .tool-card {
            background: rgba(15, 20, 30, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .tool-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 255, 255, 0.3);
        }
        
        .tool-card.selected {
            border-color: #ff6600;
            background: rgba(255, 102, 0, 0.1);
        }
        
        /* Payload Badge */
        .payload-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 102, 0, 0.1);
            border: 1px solid #ff6600;
            color: #ff6600;
        }
        
        /* Position Marker */
        .position-marker {
            background: rgba(255, 102, 0, 0.2);
            border: 2px solid #ff6600;
            border-radius: 4px;
            padding: 2px 4px;
            color: #ff6600;
            font-weight: bold;
            cursor: pointer;
        }
        
        .position-marker:hover {
            background: rgba(255, 102, 0, 0.4);
        }
        
        /* Attack Progress */
        .attack-progress {
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .attack-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #ff00ff);
            transition: width 0.3s ease;
        }
        
        /* Result Row */
        .result-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 102, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .result-row:hover {
            background: rgba(255, 102, 0, 0.1);
        }
        
        .result-row.success {
            border-left: 4px solid #00ff00;
        }
        
        .result-row.failed {
            border-left: 4px solid #ff0000;
        }
        
        /* Request/Response View */
        .http-panel {
            background: #0a0e1a;
            border: 1px solid #ff6600;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* Tab Navigation */
        .intruder-tab {
            padding: 12px 24px;
            background: rgba(20, 15, 30, 0.95);
            border: 1px solid rgba(255, 102, 0, 0.3);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .intruder-tab.active {
            background: rgba(255, 102, 0, 0.2);
            border-color: #ff6600;
            color: #ff6600;
        }
        
        .intruder-tab:hover {
            background: rgba(255, 102, 0, 0.1);
        }
        
        /* Severity Indicators */
        .severity-critical { color: #ff4444; }
        .severity-high { color: #ff8844; }
        .severity-medium { color: #ffdd44; }
        .severity-low { color: #44ff44; }
        
        /* Navigation */
        .nav-link {
            position: relative;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .nav-link:hover::before {
            width: 80%;
        }
        
        .nav-link.active {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        /* Pulse Animation */
        .pulse-orange {
            animation: pulse-orange 2s ease-in-out infinite;
        }
        
        @keyframes pulse-orange {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 102, 0, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 102, 0, 0.6); }
        }
        
        /* Terminal Styles */
        #terminal-container {
            height: 300px;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ff6600;
        }
        
        .terminal {
            padding: 10px;
        }
        
        /* AI Suggestion Badge */
        .ai-badge {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            margin-left: 8px;
        }
        
        /* Confidence Meter */
        .confidence-meter {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #00ff00);
            transition: width 0.3s ease;
        }
    </style>
</head>
