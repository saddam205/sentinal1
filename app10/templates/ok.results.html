<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-1 | Neural Intelligence Hub v6.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css"/>

    <style>
        :root {
            --neon-blue: #00ffff;
            --neon-red: #ff3131;
            --neon-purple: #9945FF;
            --neon-green: #00ff9d;
            --neon-yellow: #ffd700;
            --bg-dark: #02040a;
            --panel-bg: rgba(13, 17, 23, 0.95);
        }
        body {
            background-color: var(--bg-dark);
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.02) 0%, transparent 20%);
        }
        .cyber-border { 
            border: 1px solid rgba(0, 255, 255, 0.2); 
            transition: all 0.3s ease; 
            position: relative;
            overflow: hidden;
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-red));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            border-radius: inherit;
        }
        .cyber-border:hover::before {
            opacity: 0.3;
        }
        .cyber-border:hover { 
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        .glitch-text { 
            text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-blue);
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: none; }
            92% { transform: none; }
            93% { transform: skew(2deg); }
            94% { transform: skew(-2deg); }
            95% { transform: skew(0deg); }
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); }
        .terminal-text {
            font-family: 'Fira Code', monospace;
            color: #00ff9d;
        }
        .layer-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .layer-1 { background: rgba(0, 255, 255, 0.2); color: #00ffff; }
        .layer-2 { background: rgba(153, 69, 255, 0.2); color: #9945FF; }
        .layer-3 { background: rgba(255, 49, 49, 0.2); color: #ff3131; }
        .layer-4 { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .layer-5 { background: rgba(0, 255, 157, 0.2); color: #00ff9d; }
        .layer-6 { background: rgba(255, 69, 0, 0.2); color: #ff4500; }
        .layer-7 { background: rgba(147, 112, 219, 0.2); color: #9370db; }
        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        #attackGraph {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .metric-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(153, 69, 255, 0.1));
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .severity-critical { color: #ff4444; font-weight: bold; }
        .severity-high { color: #ff8800; font-weight: bold; }
        .severity-medium { color: #ffff00; font-weight: bold; }
        .severity-low { color: #00ff00; font-weight: bold; }
        .severity-info { color: #888888; font-weight: bold; }
        .tool-tab {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .tool-tab.active {
            background: rgba(0, 255, 255, 0.1);
            border-bottom-color: var(--neon-blue);
        }
        .finding-item {
            border-left: 3px solid;
            padding: 8px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        .exploit-card {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), rgba(255, 0, 255, 0.1));
            border: 1px solid rgba(255, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .exploit-card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .execute-btn {
            background: linear-gradient(135deg, #00ff9d, #00ffff);
            color: black;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .execute-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .thought-item {
            border-left: 3px solid #9945FF;
            padding: 8px;
            margin-bottom: 8px;
            background: rgba(153, 69, 255, 0.1);
            transition: all 0.3s ease;
        }
        .thought-item:hover {
            background: rgba(153, 69, 255, 0.2);
            transform: translateX(5px);
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .tool-status {
            font-size: 8px;
            color: #888;
        }
        .tool-tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .tool-tabs-container::-webkit-scrollbar {
            height: 3px;
        }
    </style>
</head>
<body class="p-6">
    <!-- Header with Brain Status -->
    <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tighter glitch-text">
                SENTINEL-1 
                <span class="text-sm font-light text-cyan-400">v6.5</span>
                <span class="ml-2 text-xs bg-purple-900/50 text-purple-400 px-2 py-1 rounded">7-LAYER BRAIN</span>
            </h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Autonomous Neural Intelligence Hub</p>
        </div>
        <div id="connectionStatus" class="flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
            <span class="text-xs font-mono text-red-500">DISCONNECTED</span>
        </div>
    </header>

    <!-- Brain Layer Status Bar -->
    <div class="grid grid-cols-7 gap-2 mb-6 text-[10px] font-mono">
        <div class="layer-1 layer-badge text-center">L1: CNN</div>
        <div class="layer-2 layer-badge text-center">L2: GNN</div>
        <div class="layer-3 layer-badge text-center">L3: MiniLM</div>
        <div class="layer-4 layer-badge text-center">L4: BNN</div>
        <div class="layer-5 layer-badge text-center">L5: GAN</div>
        <div class="layer-6 layer-badge text-center">L6: EMILY</div>
        <div class="layer-7 layer-badge text-center">L7: SPINE</div>
    </div>

    <!-- Target Input Section -->
    <div class="grid grid-cols-12 gap-6 mb-6">
        <div class="col-span-12 lg:col-span-8">
            <div class="bg-[--panel-bg] p-4 rounded-xl cyber-border">
                <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">
                    <i class="fas fa-bullseye text-cyan-400 mr-2"></i>TARGET URL / IP
                </label>
                <div class="flex gap-2">
                    <input type="text" id="urlInput" placeholder="https://target.com or 192.168.1.100" 
                           class="w-full bg-black/40 border border-gray-700 rounded p-3 text-white focus:border-cyan-500 outline-none font-mono text-sm">
                    <button onclick="startNeuralScan()" class="bg-gradient-to-r from-cyan-600 to-purple-600 hover:from-cyan-500 hover:to-purple-500 text-white px-8 py-2 rounded font-bold text-xs transition-all flex items-center gap-2">
                        <i class="fas fa-brain"></i> NEURAL SCAN
                    </button>
                </div>
                <div id="targetDisplay" class="text-xs text-cyan-400 mt-2 font-mono flex items-center gap-2">
                    <span class="status-pulse">⚡</span> Ready for target
                </div>
            </div>
        </div>
        <div class="col-span-12 lg:col-span-4">
            <div class="bg-[--panel-bg] p-4 rounded-xl cyber-border flex items-center justify-between">
                <div>
                    <div class="text-xs text-gray-500">BRAIN STATE</div>
                    <div class="text-lg font-bold text-cyan-400" id="brainState">ACTIVE</div>
                </div>
                <div>
                    <div class="text-xs text-gray-500">THOUGHTS</div>
                    <div class="text-lg font-bold text-purple-400" id="thoughtCount">0</div>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-cyan-400 flex items-center justify-center">
                    <i class="fas fa-microchip text-cyan-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Grid -->
    <div class="grid grid-cols-12 gap-6">
        <!-- Left Column: Radar + Neural Insights -->
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <div class="bg-[--panel-bg] p-6 rounded-xl cyber-border">
                <h3 class="text-sm font-bold mb-4 text-cyan-400 uppercase tracking-tighter flex items-center justify-between">
                    <span><i class="fas fa-microchip mr-2"></i>Risk Radar (Layer 4)</span>
                    <span class="text-[10px] bg-cyan-900/30 px-2 py-1 rounded">BNN OUTPUT</span>
                </h3>
                <canvas id="riskRadar" height="250"></canvas>
                <div class="grid grid-cols-3 gap-2 mt-4 text-[10px]">
                    <div class="text-center p-2 bg-black/40 rounded">
                        <div class="text-gray-500">CONFIDENCE</div>
                        <div class="text-lg font-bold text-green-400" id="confidenceValue">0%</div>
                    </div>
                    <div class="text-center p-2 bg-black/40 rounded">
                        <div class="text-gray-500">UNCERTAINTY</div>
